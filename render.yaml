services:
  - type: web
    name: pdtic-aeb
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/pdtic-moscow run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /api/health
