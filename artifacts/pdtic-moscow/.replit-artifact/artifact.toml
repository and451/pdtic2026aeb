kind = "web"
previewPath = "/"
title = "PDTIC/AEB — Gestão MoSCoW"
version = "1.0.0"
id = "artifacts/pdtic-moscow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22980

[services.development]
run = "pnpm --filter @workspace/pdtic-moscow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdtic-moscow", "run", "build" ]
publicDir = "artifacts/pdtic-moscow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22980"
BASE_PATH = "/"
